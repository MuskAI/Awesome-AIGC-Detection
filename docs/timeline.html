<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Awesome AIGC Detection — Timeline</title>
<style>
  :root {
    --bg: #0d1117; --surface: #161b22; --border: #30363d;
    --text: #e6edf3; --muted: #8b949e; --accent: #58a6ff; --link: #79c0ff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
         display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

  header {
    padding: 14px 24px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;
    background: var(--surface);
  }
  header h1 { font-size: 1.2rem; font-weight: 600; }
  header h1 span { color: var(--accent); }
  .stat-row { display: flex; gap: 16px; font-size: 0.8rem; color: var(--muted); }
  .stat-row b { color: var(--text); }

  .toolbar {
    padding: 10px 20px; background: var(--surface); border-bottom: 1px solid var(--border);
    display: flex; gap: 8px; flex-wrap: wrap; align-items: center; flex-shrink: 0;
  }
  .toolbar input {
    background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); padding: 6px 12px; font-size: 0.85rem; outline: none; min-width: 180px;
  }
  .toolbar input:focus { border-color: var(--accent); }
  .sep { width: 1px; height: 24px; background: var(--border); margin: 0 6px; }
  .btn {
    padding: 5px 14px; border-radius: 6px; font-size: 0.8rem; cursor: pointer;
    border: 1px solid var(--border); background: var(--bg); color: var(--text);
    transition: all 0.15s;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }
  .btn-year { min-width: 44px; }

  #main-area { flex: 1; overflow: hidden; position: relative; background: var(--bg); }
  #main-svg { width: 100%; height: 100%; cursor: grab; }
  #main-svg:active { cursor: grabbing; }

  #minimap-wrap {
    position: absolute; bottom: 60px; right: 16px;
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    padding: 8px; z-index: 100;
  }
  #minimap-title { font-size: 0.7rem; color: var(--muted); text-align: center; margin-bottom: 6px; }
  #mini-svg { display: block; }

  #zoom-controls {
    position: absolute; bottom: 16px; right: 16px;
    display: flex; gap: 6px; z-index: 100;
  }

  #tooltip {
    position: fixed; background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 14px 18px; max-width: 380px; font-size: 0.85rem; line-height: 1.5;
    z-index: 9999; box-shadow: 0 12px 32px rgba(0,0,0,0.5); display: none;
    color: var(--text);
  }
  #tooltip h4 { color: var(--accent); margin-bottom: 8px; font-size: 0.95rem; font-weight: 600; }
  #tooltip .meta { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
  #tooltip .pill { display: inline-block; padding: 2px 10px; border-radius: 12px;
           font-size: 0.7rem; font-weight: 600; }
  #tooltip .pill-img { background: #f97316; color: #000; }
  #tooltip .pill-vid { background: #22d3ee; color: #000; }
  #tooltip .pill-txt { background: #a78bfa; color: #000; }
  #tooltip .pill-year { background: var(--border); color: var(--text); }
  #tooltip .links { display: flex; gap: 10px; }
  #tooltip .links a { 
    display: inline-flex; align-items: center; gap: 4px;
    padding: 4px 10px; border-radius: 6px; 
    background: var(--bg); border: 1px solid var(--border);
    color: var(--link); text-decoration: none; font-size: 0.8rem;
  }
  #tooltip .links a:hover { border-color: var(--accent); background: var(--surface); }

  footer {
    text-align: center; padding: 10px; font-size: 0.75rem; color: var(--muted);
    border-top: 1px solid var(--border); flex-shrink: 0; background: var(--surface);
  }
  footer a { color: var(--link); }
  
  .year-label { font-size: 11px; fill: var(--muted); }
  .quarter-label { font-size: 9px; fill: var(--muted); }
  .cat-label { font-size: 12px; fill: var(--text); font-weight: 500; }
</style>
</head>
<body>
<header>
  <h1>📅 <span>Awesome AIGC Detection</span> — Timeline</h1>
  <div class="stat-row">
    <span>Total <b id="total-count">—</b></span>
    <span>Image <b id="img-count">—</b></span>
    <span>Video <b id="vid-count">—</b></span>
    <span>Text <b id="txt-count">—</b></span>
    <a href="https://github.com/MuskAI/Awesome-AIGC-Detection" target="_blank" style="color:var(--link)">⭐ GitHub</a>
  </div>
</header>

<div class="toolbar">
  <input id="search" type="text" placeholder="🔍 Search papers..." />
  <div class="sep"></div>
  <button class="btn btn-year" onclick="jumpYear(2020)">2020</button>
  <button class="btn btn-year" onclick="jumpYear(2021)">2021</button>
  <button class="btn btn-year" onclick="jumpYear(2022)">2022</button>
  <button class="btn btn-year" onclick="jumpYear(2023)">2023</button>
  <button class="btn btn-year" onclick="jumpYear(2024)">2024</button>
  <button class="btn btn-year" onclick="jumpYear(2025)">2025</button>
  <button class="btn btn-year" onclick="jumpYear(2026)">2026</button>
  <div class="sep"></div>
  <button class="btn cat-btn active" onclick="filterCat('all')" data-cat="all">All</button>
  <button class="btn cat-btn" onclick="filterCat('Image')" data-cat="Image">Image</button>
  <button class="btn cat-btn" onclick="filterCat('Video')" data-cat="Video">Video</button>
  <button class="btn cat-btn" onclick="filterCat('Text')" data-cat="Text">Text</button>
  <div class="sep"></div>
  <button class="btn" onclick="resetView()" style="color:var(--accent)">⌂ Reset</button>
  <span id="vis-count" style="font-size:0.75rem;color:var(--muted);margin-left:8px;"></span>
</div>

<div id="main-area">
  <svg id="main-svg"></svg>
  <div id="minimap-wrap">
    <div id="minimap-title">Overview</div>
    <svg id="mini-svg" width="200" height="50"></svg>
  </div>
  <div id="zoom-controls">
    <button class="btn" onclick="zoomBy(1.4)">＋</button>
    <button class="btn" onclick="zoomBy(0.7)">－</button>
  </div>
</div>

<div id="tooltip"></div>

<footer>
  Data: <a href="https://github.com/MuskAI/Awesome-AIGC-Detection" target="_blank">Awesome-AIGC-Detection</a> ·
  Built with <a href="https://d3js.org" target="_blank">D3.js v7</a>
</footer>

<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script>
const COLORS = {
  'Image Detection': '#f97316',
  'Video Detection': '#22d3ee',
  'Text Detection': '#a78bfa'
};

const CAT_ORDER = {'Image Detection': 0, 'Video Detection': 1, 'Text Detection': 2};

let svg, gMain, xScale, yScale;
let currentTransform = d3.zoomIdentity;
let allData = [], currentData = [];
let currentCat = 'all';

const margin = {top: 40, right: 80, bottom: 40, left: 100};

async function init() {
  const response = await fetch('timeline_data.json');
  allData = await response.json();
  currentData = [...allData];
  
  updateStats();
  setupSVG();
  setupZoom();
  setupSearch();
  render();
}

function updateStats() {
  const counts = {'Image Detection': 0, 'Video Detection': 0, 'Text Detection': 0};
  allData.forEach(d => counts[d.category]++);
  document.getElementById('total-count').textContent = allData.length;
  document.getElementById('img-count').textContent = counts['Image Detection'];
  document.getElementById('vid-count').textContent = counts['Video Detection'];
  document.getElementById('txt-count').textContent = counts['Text Detection'];
}

function setupSVG() {
  const container = document.getElementById('main-area');
  const width = container.clientWidth;
  const height = container.clientHeight;
  
  svg = d3.select('#main-svg').attr('width', width).attr('height', height);
  gMain = svg.append('g');
  
  // X: year + quarter, Y: category
  xScale = d3.scaleLinear().domain([2020, 2026.9]).range([margin.left, width - margin.right]);
  yScale = d3.scaleBand().domain(['Image Detection', 'Video Detection', 'Text Detection'])
    .range([margin.top, height - margin.bottom]).padding(0.3);
}

function setupZoom() {
  const zoom = d3.zoom().scaleExtent([0.2, 10]).on('zoom', (event) => {
    currentTransform = event.transform;
    gMain.attr('transform', `translate(${currentTransform.x},${currentTransform.y}) scale(${currentTransform.k})`);
    render();
  });
  svg.call(zoom);
}

function setupSearch() {
  document.getElementById('search').addEventListener('input', e => applyFilters(e.target.value.toLowerCase()));
}

function filterCat(cat) {
  currentCat = cat;
  document.querySelectorAll('.cat-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.cat === cat || (cat === 'all' && btn.dataset.cat === 'all'));
  });
  applyFilters(document.getElementById('search').value.toLowerCase());
}

function applyFilters(searchQ) {
  currentData = allData.filter(d => {
    const matchCat = currentCat === 'all' || d.category.includes(currentCat);
    const matchSearch = !searchQ || d.name.toLowerCase().includes(searchQ) || d.conference.toLowerCase().includes(searchQ);
    return matchCat && matchSearch;
  });
  render();
  document.getElementById('vis-count').textContent = currentData.length !== allData.length ? `(${currentData.length} / ${allData.length})` : '';
}

function render() {
  const k = currentTransform.k;
  gMain.selectAll('*').remove();
  
  // Grid lines - years
  for (let y = 2020; y <= 2026; y++) {
    gMain.append('line')
      .attr('x1', xScale(y)).attr('y1', 20)
      .attr('x2', xScale(y)).attr('y2', 800)
      .attr('stroke', '#30363d').attr('stroke-dasharray', '3,3')
      .attr('stroke-width', 1/k);
    
    gMain.append('text')
      .attr('x', xScale(y)).attr('y', 15)
      .attr('text-anchor', 'middle').attr('fill', '#8b949e')
      .attr('font-size', 11/k + 'px').text(y);
  }
  
  // Quarter labels
  for (let y = 2020; y <= 2026; y++) {
    for (let q = 1; q <= 4; q++) {
      gMain.append('text')
        .attr('x', xScale(y + (q-1)*0.25)).attr('y', 30)
        .attr('text-anchor', 'middle').attr('fill', '#6e7681')
        .attr('font-size', 8/k + 'px').text(`Q${q}`);
    }
  }
  
  // Category labels
  Object.keys(CAT_ORDER).forEach(cat => {
    gMain.append('text')
      .attr('x', margin.left - 10).attr('y', yScale(cat) + yScale.bandwidth()/2 + 4)
      .attr('text-anchor', 'end').attr('fill', COLORS[cat])
      .attr('font-size', 12).attr('font-weight', '600')
      .text(cat.replace(' Detection', ''));
  });
  
  // Group by category
  const catGroups = {};
  currentData.forEach(d => {
    if (!catGroups[d.category]) catGroups[d.category] = [];
    catGroups[d.category].push(d);
  });
  
  // Render dots per category
  Object.keys(catGroups).forEach(cat => {
    const items = catGroups[cat];
    const y = yScale(cat) + yScale.bandwidth() / 2;
    
    items.forEach((d, i) => {
      // Position: year + (month-1)/12, add small offset based on index to avoid overlap
      const baseX = d.year + (d.month - 1) / 12;
      const offset = (i % 10) * 0.008;
      const x = xScale(baseX + offset);
      
      // Dot
      const dot = gMain.append('circle')
        .attr('cx', x).attr('cy', y)
        .attr('r', 6/k + 3)
        .attr('fill', COLORS[cat])
        .attr('stroke', '#fff').attr('stroke-width', 1.5/k + 0.5)
        .attr('cursor', 'pointer')
        .style('filter', 'drop-shadow(0 2px 4px rgba(0,0,0,0.4))')
        .on('mouseenter', e => showTooltip(e, d))
        .on('mouseleave', hideTooltip)
        .on('click', e => {
          e.stopPropagation();
          showTooltip(e, d);
        });
      
      // Label when zoomed in
      if (k > 0.6) {
        gMain.append('text')
          .attr('x', x + 8/k).attr('y', y + 3/k)
          .attr('fill', '#e6edf3').attr('font-size', 10/k + 'px')
          .attr('opacity', Math.min(1, (k - 0.5) * 2))
          .text(d.short || d.name.split(':')[0].split(' ')[0].slice(0, 12))
          .attr('pointer-events', 'none');
      }
    });
  });
}

function showTooltip(event, d) {
  const tip = document.getElementById('tooltip');
  const catPill = d.category.includes('Image') ? 'pill-img' : d.category.includes('Video') ? 'pill-vid' : 'pill-txt';
  const catName = d.category.replace(' Detection', '');
  
  let links = '<div class="links">';
  if (d.arxiv) links += `<a href="https://arxiv.org/abs/${d.arxiv}" target="_blank">📄 Paper</a>`;
  if (d.code) links += `<a href="https://github.com/${d.code}" target="_blank">💻 Code</a>`;
  links += '</div>';
  
  tip.innerHTML = `
    <h4>${d.name}</h4>
    <div class="meta">
      <span class="pill ${catPill}">${catName}</span>
      <span class="pill pill-year">${d.year} ${d.quarter || 'Q1'}</span>
      <span class="pill pill-year" style="background:#30363d">${d.conference}</span>
    </div>
    ${links}
  `;
  
  tip.style.display = 'block';
  const x = Math.min(event.pageX + 15, window.innerWidth - 400);
  const y = Math.min(event.pageY + 15, window.innerHeight - 200);
  tip.style.left = x + 'px';
  tip.style.top = y + 'px';
}

function hideTooltip() {
  // Don't hide immediately - let user click links
}

function jumpYear(year) {
  const container = document.getElementById('main-area');
  const width = container.clientWidth;
  const targetX = xScale(year);
  
  svg.transition().duration(500).call(
    d3.zoom.transform,
    d3.zoomIdentity.translate(width/2 - targetX * currentTransform.k, 0).scale(currentTransform.k)
  );
}

function zoomBy(factor) {
  svg.transition().duration(300).call(d3.zoom.scaleBy, factor);
}

function resetView() {
  svg.transition().duration(500).call(d3.zoom.transform, d3.zoomIdentity);
  document.getElementById('search').value = '';
  currentCat = 'all';
  document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.cat === 'all'));
  currentData = [...allData];
  render();
}

init();
</script>
</body>
</html>
