<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Awesome AIGC Detection — Timeline</title>
<style>
  :root {
    --bg: #0d1117; --surface: #161b22; --border: #30363d;
    --text: #e6edf3; --muted: #8b949e; --accent: #58a6ff; --link: #79c0ff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
         display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

  header {
    padding: 16px 24px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;
    background: var(--surface);
  }
  header h1 { font-size: 1.3rem; font-weight: 600; }
  header h1 span { color: var(--accent); }
  .stat-row { display: flex; gap: 20px; font-size: 0.85rem; color: var(--muted); }
  .stat-row b { color: var(--text); }

  .toolbar {
    padding: 10px 20px; background: var(--surface); border-bottom: 1px solid var(--border);
    display: flex; gap: 8px; flex-wrap: wrap; align-items: center; flex-shrink: 0;
  }
  .toolbar input {
    background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); padding: 6px 12px; font-size: 0.85rem; outline: none; min-width: 200px;
  }
  .toolbar input:focus { border-color: var(--accent); }
  .sep { width: 1px; height: 24px; background: var(--border); margin: 0 6px; }
  .btn {
    padding: 5px 14px; border-radius: 6px; font-size: 0.8rem; cursor: pointer;
    border: 1px solid var(--border); background: var(--bg); color: var(--text);
    transition: all 0.15s;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }
  .btn-year { min-width: 44px; }

  #main-area { flex: 1; overflow: hidden; position: relative; background: var(--bg); }
  #main-svg { width: 100%; height: 100%; cursor: grab; }
  #main-svg:active { cursor: grabbing; }

  #minimap-wrap {
    position: absolute; bottom: 60px; right: 16px;
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    padding: 8px; z-index: 100;
  }
  #minimap-title { font-size: 0.7rem; color: var(--muted); text-align: center; margin-bottom: 6px; }
  #mini-svg { display: block; }

  #zoom-controls {
    position: absolute; bottom: 16px; right: 16px;
    display: flex; gap: 6px; z-index: 100;
  }

  #tooltip {
    position: fixed; background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 14px 18px; pointer-events: none; max-width: 380px; font-size: 0.85rem; line-height: 1.5;
    z-index: 9999; box-shadow: 0 12px 32px rgba(0,0,0,0.5); display: none;
    color: var(--text);
  }
  #tooltip h4 { color: var(--accent); margin-bottom: 6px; font-size: 0.95rem; font-weight: 600; }
  #tooltip .meta { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
  #tooltip .pill { display: inline-block; padding: 2px 10px; border-radius: 12px;
           font-size: 0.7rem; font-weight: 600; }
  #tooltip .pill-img { background: #f97316; color: #000; }
  #tooltip .pill-vid { background: #22d3ee; color: #000; }
  #tooltip .pill-txt { background: #a78bfa; color: #000; }
  #tooltip .pill-year { background: var(--border); color: var(--text); }
  #tooltip a { color: var(--link); text-decoration: none; margin-right: 10px; }
  #tooltip a:hover { text-decoration: underline; }

  footer {
    text-align: center; padding: 10px; font-size: 0.75rem; color: var(--muted);
    border-top: 1px solid var(--border); flex-shrink: 0; background: var(--surface);
  }
  footer a { color: var(--link); }
  
  .legend { display: flex; gap: 14px; margin-left: 8px; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 0.75rem; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
  
  .category-label { font-size: 11px; fill: var(--muted); }
  .year-line { stroke: var(--border); stroke-dasharray: 3,3; }
  .year-label { font-size: 11px; fill: var(--muted); }
</style>
</head>
<body>
<header>
  <h1>📅 <span>Awesome AIGC Detection</span> — Paper Timeline</h1>
  <div class="stat-row">
    <span>Total <b id="total-count">—</b></span>
    <span>Image <b id="img-count">—</b></span>
    <span>Video <b id="vid-count">—</b></span>
    <span>Text <b id="txt-count">—</b></span>
    <span>Span <b>2020 – 2026</b></span>
    <a href="https://github.com/MuskAI/Awesome-AIGC-Detection" target="_blank" style="color:var(--link)">⭐ GitHub</a>
  </div>
</header>

<div class="toolbar">
  <input id="search" type="text" placeholder="🔍  Search papers..." />
  <div class="sep"></div>
  <button class="btn btn-year" onclick="jumpYear(2020)">2020</button>
  <button class="btn btn-year" onclick="jumpYear(2021)">2021</button>
  <button class="btn btn-year" onclick="jumpYear(2022)">2022</button>
  <button class="btn btn-year" onclick="jumpYear(2023)">2023</button>
  <button class="btn btn-year" onclick="jumpYear(2024)">2024</button>
  <button class="btn btn-year" onclick="jumpYear(2025)">2025</button>
  <button class="btn btn-year" onclick="jumpYear(2026)">2026</button>
  <div class="sep"></div>
  <button class="btn cat-btn active" onclick="filterCat('all')" data-cat="all">All</button>
  <button class="btn cat-btn" onclick="filterCat('Image')" data-cat="Image">Image</button>
  <button class="btn cat-btn" onclick="filterCat('Video')" data-cat="Video">Video</button>
  <button class="btn cat-btn" onclick="filterCat('Text')" data-cat="Text">Text</button>
  <div class="sep"></div>
  <button class="btn" onclick="resetView()" style="color:var(--accent)">⌂ Reset</button>
  <span id="vis-count" style="font-size:0.75rem;color:var(--muted);margin-left:8px;"></span>
</div>

<div id="main-area">
  <svg id="main-svg"></svg>
  <div id="minimap-wrap">
    <div id="minimap-title">Overview</div>
    <svg id="mini-svg" width="240" height="60"></svg>
  </div>
  <div id="zoom-controls">
    <button class="btn" onclick="zoomBy(1.4)">＋</button>
    <button class="btn" onclick="zoomBy(0.7)">－</button>
  </div>
</div>

<div id="tooltip"></div>

<footer>
  Data: <a href="https://github.com/MuskAI/Awesome-AIGC-Detection" target="_blank">Awesome-AIGC-Detection</a> ·
  Built with <a href="https://d3js.org" target="_blank">D3.js v7</a>
</footer>

<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script>
const COLORS = {
  'Image Detection': '#f97316',
  'Video Detection': '#22d3ee',
  'Text Detection': '#a78bfa'
};

const CAT_ORDER = {'Image Detection': 0, 'Video Detection': 1, 'Text Detection': 2};

let svg, gMain, gDots, gLabels, gAxis, xScale, yScale;
let currentTransform = d3.zoomIdentity;
let allData = [], currentData = [];
let currentCat = 'all';

const margin = {top: 50, right: 60, bottom: 40, left: 120};

async function init() {
  const response = await fetch('timeline_data.json');
  allData = await response.json();
  currentData = [...allData];
  
  updateStats();
  setupSVG();
  setupZoom();
  setupSearch();
  render();
  initMinimap();
}

function updateStats() {
  const counts = {
    'Image Detection': 0,
    'Video Detection': 0,
    'Text Detection': 0
  };
  allData.forEach(d => counts[d.category]++);
  
  document.getElementById('total-count').textContent = allData.length;
  document.getElementById('img-count').textContent = counts['Image Detection'];
  document.getElementById('vid-count').textContent = counts['Video Detection'];
  document.getElementById('txt-count').textContent = counts['Text Detection'];
}

function setupSVG() {
  const container = document.getElementById('main-area');
  const width = container.clientWidth;
  const height = container.clientHeight;
  
  svg = d3.select('#main-svg')
    .attr('width', width)
    .attr('height', height);
  
  gMain = svg.append('g').attr('transform', `translate(${margin.left},${margin.top})`);
  
  // Scales
  xScale = d3.scaleLinear()
    .domain([2020, 2026.6])
    .range([0, width - margin.left - margin.right]);
  
  yScale = d3.scaleBand()
    .domain(['Image Detection', 'Video Detection', 'Text Detection'])
    .range([0, height - margin.top - margin.bottom])
    .padding(0.3);
  
  // Axis
  gAxis = gMain.append('g').attr('class', 'axis');
  
  // Groups
  gDots = gMain.append('g').attr('class', 'dots');
  gLabels = gMain.append('g').attr('class', 'labels');
}

function setupZoom() {
  const zoom = d3.zoom()
    .scaleExtent([0.3, 15])
    .on('zoom', (event) => {
      currentTransform = event.transform;
      gMain.attr('transform', `translate(${margin.left + currentTransform.x},${margin.top + currentTransform.y}) scale(${currentTransform.k})`);
      renderAxis();
      renderDotsLabels();
    });
  
  svg.call(zoom);
}

function setupSearch() {
  document.getElementById('search').addEventListener('input', e => {
    const q = e.target.value.toLowerCase();
    applyFilters(q);
  });
}

function filterCat(cat) {
  currentCat = cat;
  document.querySelectorAll('.cat-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.cat === cat || (cat === 'all' && btn.dataset.cat === 'all'));
  });
  applyFilters(document.getElementById('search').value.toLowerCase());
}

function applyFilters(searchQ) {
  currentData = allData.filter(d => {
    const matchCat = currentCat === 'all' || d.category.includes(currentCat);
    const matchSearch = !searchQ || d.name.toLowerCase().includes(searchQ) || d.conference.toLowerCase().includes(searchQ);
    return matchCat && matchSearch;
  });
  render();
}

function render() {
  renderAxis();
  renderDotsLabels();
  document.getElementById('vis-count').textContent = 
    currentData.length !== allData.length ? `(${currentData.length} / ${allData.length})` : '';
}

function renderAxis() {
  gAxis.selectAll('*').remove();
  
  const years = [2020, 2021, 2022, 2023, 2024, 2025, 2026];
  const x = xScale;
  
  // Year lines
  years.forEach(y => {
    gAxis.append('line')
      .attr('class', 'year-line')
      .attr('x1', x(y)).attr('y1', -30)
      .attr('x2', x(y)).attr('y2', 500)
      .attr('stroke', '#30363d')
      .attr('stroke-dasharray', '4,4')
      .attr('stroke-width', 1 / currentTransform.k);
    
    gAxis.append('text')
      .attr('class', 'year-label')
      .attr('x', x(y))
      .attr('y', -10)
      .attr('text-anchor', 'middle')
      .attr('fill', '#8b949e')
      .attr('font-size', 12 / currentTransform.k + 'px')
      .text(y);
  });
  
  // Category labels
  Object.keys(CAT_ORDER).forEach(cat => {
    gAxis.append('text')
      .attr('class', 'category-label')
      .attr('x', -15)
      .attr('y', yScale(cat) + yScale.bandwidth() / 2)
      .attr('text-anchor', 'end')
      .attr('dominant-baseline', 'middle')
      .attr('fill', COLORS[cat])
      .attr('font-size', 13)
      .attr('font-weight', '600')
      .text(cat.replace(' Detection', ''));
  });
}

function renderDotsLabels() {
  const k = currentTransform.k;
  
  // Group by category and position
  const positioned = currentData.map(d => ({
    ...d,
    x: xScale(d.year + (d.month - 0.5) / 12),
    y: yScale(d.category) + yScale.bandwidth() / 2
  }));

  // Dots
  const dots = gDots.selectAll('.dot')
    .data(positioned, d => d.name + d.year);
  
  dots.exit().remove();
  
  dots.enter()
    .append('circle')
    .attr('class', 'dot')
    .attr('r', 8)
    .attr('fill', d => COLORS[d.category])
    .attr('stroke', '#fff')
    .attr('stroke-width', 2)
    .attr('cursor', 'pointer')
    .style('filter', 'drop-shadow(0 2px 4px rgba(0,0,0,0.3))')
    .on('mouseenter', showTooltip)
    .on('mouseleave', hideTooltip)
    .merge(dots)
    .attr('cx', d => d.x)
    .attr('cy', d => d.y)
    .attr('r', 7 / k + 2);

  // Labels - show when zoomed in enough
  const labels = gLabels.selectAll('.label')
    .data(positioned, d => d.name + d.year);
  
  labels.exit().remove();
  
  labels.enter()
    .append('text')
    .attr('class', 'label')
    .attr('fill', '#e6edf3')
    .attr('cursor', 'pointer')
    .attr('font-size', 11)
    .on('mouseenter', showTooltip)
    .on('mouseleave', hideTooltip)
    .merge(labels)
    .attr('x', d => d.x + 12 / k)
    .attr('y', d => d.y + 4 / k)
    .attr('font-size', 11 / k + 'px')
    .text(d => d.short || d.name.split(':')[0].split(' ')[0].slice(0, 18))
    .style('opacity', k > 0.8 ? 1 : 0);
}

function showTooltip(event, d) {
  const tip = document.getElementById('tooltip');
  const catPill = d.category.includes('Image') ? 'pill-img' : d.category.includes('Video') ? 'pill-vid' : 'pill-txt';
  const catName = d.category.replace(' Detection', '');
  
  let links = '';
  if (d.arxiv) links += `<a href="https://arxiv.org/abs/${d.arxiv}" target="_blank">📄 Paper</a>`;
  if (d.code) links += `<a href="https://github.com/${d.code}" target="_blank">💻 Code</a>`;
  
  tip.innerHTML = `
    <h4>${d.name}</h4>
    <div class="meta">
      <span class="pill ${catPill}">${catName}</span>
      <span class="pill pill-year">${d.year}</span>
      <span class="pill pill-year" style="background:#30363d">${d.conference}</span>
    </div>
    ${links}
  `;
  
  tip.style.display = 'block';
  const x = Math.min(event.pageX + 15, window.innerWidth - 400);
  const y = Math.min(event.pageY + 15, window.innerHeight - 200);
  tip.style.left = x + 'px';
  tip.style.top = y + 'px';
}

function hideTooltip() {
  document.getElementById('tooltip').style.display = 'none';
}

function jumpYear(year) {
  const container = document.getElementById('main-area');
  const width = container.clientWidth;
  const targetX = xScale(year);
  const currentX = -currentTransform.x;
  
  svg.transition().duration(600).call(
    d3.zoom.transform,
    d3.zoomIdentity.translate(width/2 - targetX * currentTransform.k, currentTransform.y).scale(currentTransform.k)
  );
}

function zoomBy(factor) {
  svg.transition().duration(300).call(d3.zoom.scaleBy, factor);
}

function resetView() {
  svg.transition().duration(500).call(
    d3.zoom.transform, d3.zoomIdentity
  );
  document.getElementById('search').value = '';
  currentCat = 'all';
  document.querySelectorAll('.cat-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.cat === 'all');
  });
  currentData = [...allData];
  render();
}

function initMinimap() {
  const miniW = 240, miniH = 60;
  const miniX = d3.scaleLinear().domain([2020, 2026.6]).range([10, miniW - 10]);
  const miniY = d3.scaleBand().domain(['Image Detection', 'Video Detection', 'Text Detection']).range([10, miniH - 10]).padding(0.3);
  
  const miniSvg = d3.select('#mini-svg');
  miniSvg.selectAll('*').remove();
  
  miniSvg.append('rect').attr('width', miniW).attr('height', miniH).attr('fill', '#0d1117').attr('rx', 4);
  
  allData.forEach(d => {
    miniSvg.append('circle')
      .attr('cx', miniX(d.year + (d.month - 0.5) / 12))
      .attr('cy', miniY(d.category) + miniY.bandwidth() / 2)
      .attr('r', 2)
      .attr('fill', COLORS[d.category])
      .attr('opacity', 0.7);
  });
}

// Start
init();
</script>
</body>
</html>
